databases:
  - name: uclicky-postgres
    plan: free
    databaseName: uclicky
    user: uclicky

services:
  - type: web
    name: uclicky-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm run prisma:migrate:prod && npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.11.1"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: uclicky-postgres
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 7d
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_VERIFY_SERVICE_SID
        sync: false
      - key: FORCE_DEV_OTP_MOCK
        value: "true"
      - key: DEV_OTP_CODE
        value: "123456"
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: SENDGRID_FROM_NAME
        value: UCLICK-Y
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: KBZPAY_API_URL
        sync: false
      - key: KBZPAY_MERCHANT_CODE
        sync: false
      - key: KBZPAY_API_KEY
        sync: false
      - key: KBZPAY_API_SECRET
        sync: false
      - key: KBZPAY_CALLBACK_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: uclicky-partner-dashboard
    runtime: node
    plan: free
    rootDir: partner-dashboard
    buildCommand: npm ci && npm run build
    startCommand: npx next start -p $PORT
    envVars:
      - key: NODE_VERSION
        value: "20.11.1"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false

  - type: web
    name: uclicky-admin-dashboard
    runtime: node
    plan: free
    rootDir: admin-dashboard
    buildCommand: npm ci && npm run build
    startCommand: npx next start -p $PORT
    envVars:
      - key: NODE_VERSION
        value: "20.11.1"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false

